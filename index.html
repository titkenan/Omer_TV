<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📺 Omer TV - Canlı IPTV</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            height: 100vh;
            overflow: hidden;
        }

        .container {
            display: flex;
            height: 100vh;
        }

        /* Sidebar */
        .sidebar {
            width: 300px;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(10px);
            overflow-y: auto;
            border-right: 1px solid rgba(255, 255, 255, 0.1);
        }

        .header {
            padding: 20px;
            background: rgba(0, 0, 0, 0.5);
            text-align: center;
            border-bottom: 2px solid #667eea;
        }

        .header h1 {
            font-size: 24px;
            margin-bottom: 5px;
        }

        .header p {
            font-size: 12px;
            opacity: 0.7;
        }

        .search {
            padding: 15px;
            background: rgba(0, 0, 0, 0.3);
        }

        .search input {
            width: 100%;
            padding: 10px;
            border: none;
            border-radius: 5px;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            font-size: 14px;
        }

        .search input::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }

        .category-filter {
            padding: 10px 15px;
            display: flex;
            gap: 5px;
            flex-wrap: wrap;
        }

        .cat-btn {
            padding: 5px 12px;
            background: rgba(255, 255, 255, 0.1);
            border: none;
            border-radius: 15px;
            color: white;
            cursor: pointer;
            font-size: 11px;
            transition: all 0.3s;
        }

        .cat-btn:hover, .cat-btn.active {
            background: #667eea;
        }

        .channels {
            padding: 10px;
        }

        .channel {
            padding: 12px;
            margin: 5px 0;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            border-left: 3px solid transparent;
        }

        .channel:hover {
            background: rgba(255, 255, 255, 0.1);
            border-left-color: #667eea;
            transform: translateX(5px);
        }

        .channel.active {
            background: rgba(102, 126, 234, 0.3);
            border-left-color: #667eea;
        }

        .channel-name {
            font-weight: bold;
            font-size: 14px;
        }

        .channel-category {
            font-size: 11px;
            opacity: 0.6;
            margin-top: 3px;
        }

        /* Player Area */
        .player-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: rgba(0, 0, 0, 0.5);
        }

        .now-playing {
            padding: 20px;
            background: rgba(0, 0, 0, 0.7);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .now-playing h2 {
            font-size: 28px;
            margin-bottom: 5px;
        }

        .now-playing .info {
            font-size: 14px;
            opacity: 0.7;
        }

        .video-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        video {
            width: 100%;
            max-width: 1200px;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
        }

        .loading {
            text-align: center;
            padding: 40px;
        }

        .spinner {
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-top: 4px solid white;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .stats {
            padding: 15px;
            background: rgba(0, 0, 0, 0.3);
            text-align: center;
            font-size: 12px;
            opacity: 0.7;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .sidebar {
                width: 100%;
                height: 40vh;
            }

            .container {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Sidebar -->
        <div class="sidebar">
            <div class="header">
                <h1>📺 Omer TV</h1>
                <p id="channel-count">Kanallar yükleniyor...</p>
            </div>

            <div class="search">
                <input type="text" id="searchInput" placeholder="🔍 Kanal ara...">
            </div>

            <div class="category-filter" id="categoryFilter"></div>

            <div class="channels" id="channelList"></div>

            <div class="stats">
                Son güncelleme: <span id="lastUpdate">-</span>
            </div>
        </div>

        <!-- Player -->
        <div class="player-area">
            <div class="now-playing">
                <h2 id="nowPlayingTitle">Kanal Seçin</h2>
                <div class="info" id="nowPlayingInfo">Soldaki listeden bir kanal seçin</div>
            </div>

            <div class="video-container">
                <video id="video" controls poster="https://via.placeholder.com/800x450/667eea/ffffff?text=Omer+TV"></video>
            </div>
        </div>
    </div>

    <script>
        let channels = [];
        let filteredChannels = [];
        let currentCategory = 'Tümü';
        let hls = null;

        // M3U dosyasını yükle
        async function loadPlaylist() {
            try {
                const response = await fetch('https://raw.githubusercontent.com/titkenan/Omer_TV/main/channels.m3u');
                const text = await response.text();
                channels = parseM3U(text);
                filteredChannels = channels;
                
                displayChannels();
                createCategoryButtons();
                updateStats();
            } catch (error) {
                console.error('Playlist yüklenemedi:', error);
                document.getElementById('channel-count').textContent = 'Hata: Playlist yüklenemedi';
            }
        }

        // M3U parse
        function parseM3U(content) {
            const lines = content.split('\n');
            const channels = [];
            
            for (let i = 0; i < lines.length; i++) {
                if (lines[i].startsWith('#EXTINF')) {
                    const name = lines[i].split(',')[1] || 'Unknown';
                    const logoMatch = lines[i].match(/tvg-logo="([^"]+)"/);
                    const categoryMatch = lines[i].match(/group-title="([^"]+)"/);
                    
                    const url = lines[i + 1]?.trim();
                    
                    if (url && url.startsWith('http')) {
                        channels.push({
                            name: name.trim(),
                            url: url,
                            logo: logoMatch ? logoMatch[1] : '',
                            category: categoryMatch ? categoryMatch[1] : 'Genel'
                        });
                    }
                }
            }
            
            return channels;
        }

        // Kanalları göster
        function displayChannels() {
            const container = document.getElementById('channelList');
            container.innerHTML = '';
            
            filteredChannels.forEach((ch, idx) => {
                const div = document.createElement('div');
                div.className = 'channel';
                div.innerHTML = `
                    <div class="channel-name">${ch.name}</div>
                    <div class="channel-category">${ch.category}</div>
                `;
                div.onclick = () => playChannel(ch, div);
                container.appendChild(div);
            });

            document.getElementById('channel-count').textContent = 
                `${filteredChannels.length} kanal`;
        }

        // Kategori butonları
        function createCategoryButtons() {
            const categories = ['Tümü', ...new Set(channels.map(ch => ch.category))];
            const container = document.getElementById('categoryFilter');
            
            categories.forEach(cat => {
                const btn = document.createElement('button');
                btn.className = 'cat-btn' + (cat === 'Tümü' ? ' active' : '');
                btn.textContent = cat;
                btn.onclick = () => filterByCategory(cat, btn);
                container.appendChild(btn);
            });
        }

        // Kategoriye göre filtrele
        function filterByCategory(category, btn) {
            currentCategory = category;
            
            // Buton stilini güncelle
            document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            
            // Filtrele
            if (category === 'Tümü') {
                filteredChannels = channels;
            } else {
                filteredChannels = channels.filter(ch => ch.category === category);
            }
            
            displayChannels();
        }

        // Arama
        document.getElementById('searchInput').addEventListener('input', (e) => {
            const query = e.target.value.toLowerCase();
            
            if (currentCategory === 'Tümü') {
                filteredChannels = channels.filter(ch => 
                    ch.name.toLowerCase().includes(query)
                );
            } else {
                filteredChannels = channels.filter(ch => 
                    ch.category === currentCategory && 
                    ch.name.toLowerCase().includes(query)
                );
            }
            
            displayChannels();
        });

        // Kanal çal
        function playChannel(channel, element) {
            // Aktif kanal stilini güncelle
            document.querySelectorAll('.channel').forEach(ch => ch.classList.remove('active'));
            element.classList.add('active');
            
            // Bilgileri güncelle
            document.getElementById('nowPlayingTitle').textContent = channel.name;
            document.getElementById('nowPlayingInfo').textContent = channel.category;
            
            // Video oynat
            const video = document.getElementById('video');
            
            if (hls) {
                hls.destroy();
            }
            
            if (Hls.isSupported()) {
                hls = new Hls();
                hls.loadSource(channel.url);
                hls.attachMedia(video);
                hls.on(Hls.Events.MANIFEST_PARSED, () => {
                    video.play().catch(e => console.log('Autoplay engellendi'));
                });
            } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                video.src = channel.url;
                video.addEventListener('loadedmetadata', () => {
                    video.play().catch(e => console.log('Autoplay engellendi'));
                });
            }
        }

        // İstatistikleri güncelle
        function updateStats() {
            document.getElementById('lastUpdate').textContent = new Date().toLocaleString('tr-TR');
        }

        // Başlat
        loadPlaylist();
    </script>
</body>
</html>
