name: Update M3U

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write  # Bu satır önemli!

jobs:
  update:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install Dependencies
        run: pip install requests
      
      - name: Run Scraper
        run: python scripts/scraper.py
      
      - name: Run Tester
        run: python scripts/tester.py
      
      - name: Generate M3U
        run: python scripts/generator.py
      
      - name: Generate Stats
        run: python scripts/stats.py
      
      - name: Commit and Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if ! git diff --staged --quiet; then
            git commit -m "🔄 Auto update $(date +'%Y-%m-%d %H:%M UTC')"
            git push
          else
            echo "No changes to commit"
          fi
# .github/workflows/update_m3u.yml içine ekle

- name: Update from new sources
  run: |
    python add_new_sources.py
