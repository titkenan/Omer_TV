name: Update M3U

on:
  schedule:
    - cron: '0 */6 * * *'  # Her 6 saatte
  workflow_dispatch:  # Manuel tetikleme

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
      
      - name: Pull Latest
        run: git pull origin main --rebase || true
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install Dependencies
        run: pip install requests
      
      # ✅ YENİ: Temiz playlist oluştur
      - name: Create Clean Playlist
        run: python clean_and_organize.py
      
      # Mevcut scriptler (varsa çalıştır)
      - name: Run Scraper (Optional)
        run: |
          if [ -f scripts/scraper.py ]; then
            python scripts/scraper.py || true
          fi
      
      - name: Commit and Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if ! git diff --staged --quiet; then
            git commit -m "🔄 Auto update $(date +'%Y-%m-%d %H:%M UTC')"
            git pull --rebase origin main
            git push
          else
            echo "No changes to commit"
          fi
