name: Scrape Vavoo TR

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install Dependencies
        run: pip install requests
      
      - name: Scrape Vavoo
        run: python scrape_vavoo.py
      
      - name: Commit Results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/vavoo_channels.json vavoo_channels.m3u debug_vavoo.html
          if ! git diff --staged --quiet; then
            git commit -m "🔄 Vavoo güncellendi $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push --force origin main
          fi
